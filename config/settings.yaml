## Trading System Configuration
## All parameters live here — no hardcoding in source files

account:
  starting_capital_day: 500.0
  starting_capital_swing: 500.0
  paper_trading: true  # ALWAYS start true; flip to false only after 2 profitable paper weeks

pdt:
  max_day_trades_per_5_days: 3
  rolling_period_days: 5

risk:
  max_risk_per_trade_pct: 0.01    # 1% default; max 2%
  max_position_size_pct: 0.20     # 20% of capital per stock
  daily_loss_limit_pct: 0.05      # 5% daily loss → trading pauses
  hard_stop_loss_pct: 0.10        # 10% single-day loss → bot halts
  min_reward_risk_ratio: 2.0      # Minimum 2:1 R:R on every trade

day_trader:
  enabled: true
  trading_start: "09:45"          # ET — skip open volatility
  trading_end: "15:45"            # ET — no new entries after this
  force_close_time: "15:55"       # ET — hard exit all positions

  # Universe filters
  min_price: 5.0
  max_price: 500.0
  min_avg_daily_volume: 1000000
  avoid_earnings_within_days: 2
  min_relative_volume: 1.5        # Must be 1.5x normal volume

  # Indicators
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  rsi_momentum_min: 50            # RSI > 50 required for long entries
  vwap_deviation_pct: 0.002       # Within 0.2% of VWAP for entry
  volume_ma_period: 20

  # ML
  ml_confidence_threshold: 0.60

swing_trader:
  enabled: true

  # Curated symbol watchlist — only trade symbols validated by backtesting.
  # SPY and NVDA passed (≥40% win rate, positive expectancy, Sharpe >1.0).
  # MSFT showed positive expectancy across 2 years. AAPL included but
  # watch direction breakdown — its longs need MA200 confirmation which
  # the bot enforces via the TA signal logic.
  # Set to [] to fall back to full universe scan (not recommended until
  # more symbols are validated).
  symbols:
    - SPY    # 50% win rate, positive expectancy — broad market, clean MA structure
    - NVDA   # 50% win rate, +$0.61 expectancy, Sharpe 2.65
    - MSFT   # 44-83% win rate across runs, consistently positive expectancy
    - JPM    # 50% win rate, +$1.27 expectancy, Sharpe 5.88 — financials diversify tech exposure
    - V      # 75% win rate, +$2.00 expectancy, Sharpe 14.41 — strongest performer
    # Excluded after backtesting: AAPL (inconsistent), TSLA (20% win rate), AMZN (-expectancy),
    # GOOGL/META (0 trades generated — too filtered), QQQ (1 trade only)

  # Universe (used only if symbols list above is empty)
  universe: "sp500"               # "sp500", "russell2000", or "both"
  min_market_cap: 500000000       # $500M

  # Hold time
  min_hold_days: 2
  max_hold_days: 10

  # Indicators
  ma_short: 20                    # 20-day MA for pullback entries
  ma_long: 50                     # 50-day MA for trend direction
  rsi_period: 14
  rsi_pullback_max: 45            # RSI ≤ 45 = valid pullback
  breakout_volume_ratio: 1.3      # Volume must be 1.3x avg on breakouts

  # ML
  ml_confidence_threshold: 0.55

ab_trader:
  enabled: true
  starting_capital: 1000.0

  # Universe — full US market scan
  universe: "full_us"
  min_price: 5.0
  max_price: 2000.0
  min_avg_volume: 200000
  max_symbols_per_scan: 200     # Top N by momentum pre-filter

  # Hold time (swing-style, 2-10 days)
  min_hold_days: 2
  max_hold_days: 10

  # AB-style signal thresholds
  fib_zone_tolerance: 0.01      # Within 1% of fib level counts as "at zone"
  breakout_volume_ratio: 1.5    # Volume must be 1.5x avg on breakouts
  abc_b_wave_min_retrace: 0.38  # B wave must retrace at least 38% of A
  abc_b_wave_max_retrace: 0.78  # B wave retraces at most 78% of A

  # Twitter monitoring for AB's picks
  twitter_monitor: true
  twitter_handle: "ABTradess"

  # Weekly performance target (10% tracked and reported each week)
  weekly_target_pct: 0.10

  # ML
  ml_confidence_threshold: 0.55
  ml_retrain_frequency_days: 7

options:
  enabled: false                  # Toggle options trading on/off
  max_contracts_per_trade: 1
  preferred_delta: 0.30           # ~30-delta options
  min_dte: 7                      # Minimum days to expiration
  max_dte: 30                     # Maximum days to expiration
  max_iv_percentile: 50           # Avoid buying expensive high-IV options
  stop_loss_pct: 0.50             # Close option at 50% premium loss

ml:
  enabled: true
  model_type: "random_forest"     # random_forest or gradient_boosting
  n_estimators: 200
  max_depth: 8
  retrain_frequency_days: 7
  training_lookback_days: 365
  min_training_samples: 200
  min_confidence: 0.55

  # Features used for signal prediction
  features:
    - rsi_14
    - macd
    - macd_signal
    - bb_upper_pct
    - bb_lower_pct
    - volume_ratio_20
    - vwap_deviation
    - price_momentum_5
    - price_momentum_10
    - atr_pct

  # Label generation
  forward_return_bars: 6          # Bars ahead to measure return (6 x 5min = 30 min ahead)
  bullish_threshold: 0.002        # 0.2% gain = bullish label (realistic for 5-min SPY bars)
  bearish_threshold: -0.002       # 0.2% loss = bearish label

backtesting:
  lookback_days: 365
  commission_per_share: 0.0       # Alpaca is commission-free
  slippage_pct: 0.001            # 0.1% simulated slippage
  initial_capital_day: 500.0
  initial_capital_swing: 500.0
  benchmark_symbol: "SPY"

monitoring:
  log_dir: "logs"
  db_path: "data/trades.db"
  model_dir: "models"
  daily_report_time: "16:30"
  email_alerts_enabled: false
  email_to: ""
  email_from: ""
  smtp_server: ""
  smtp_port: 587
